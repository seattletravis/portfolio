<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BLOCKS GAMEROOM</title>

		<style>
			/* MOBILE LAYOUT */
			@media (max-width: 768px) {
				#sidePanel {
					display: none;
				}

				#mobileUI {
					display: flex !important;
				}

				#canvasContainer {
					width: 100% !important;
				}

				body,
				html {
					overflow: hidden;
				}
			}
		</style>
		<script type="module" crossorigin src="/bubblegum/assets/index-CbaFDUFz.js"></script>
		<link rel="stylesheet" crossorigin href="/bubblegum/assets/index-D4FOdlTT.css">
	</head>

	<body class="bg-black select-none">
		<!-- MOBILE TOP BAR -->
		<div
			id="mobileUI"
			class="hidden flex-col bg-black p-2 border-b-4 border-green-600">
			<h1 id="mobileMessage" class="text-green-600 text-center text-sm"></h1>

			<input
				id="mobileGuess"
				type="number"
				placeholder="Enter your guess"
				class="mt-2 p-2 rounded bg-white text-black w-full" />

			<div class="flex gap-2 mt-2">
				<button
					id="mobileGuessButton"
					class="flex-1 font-bold border-4 text-green-600 bg-yellow-400 border-green-600 px-4 py-1 rounded-full">
					GUESS
				</button>

				<button
					id="mobileResetButton"
					class="flex-1 font-bold border-4 text-green-600 bg-yellow-400 border-green-600 px-4 py-1 rounded-full">
					RESET
				</button>
			</div>
		</div>

		<!-- DESKTOP LAYOUT -->
		<div class="flex h-screen">
			<!-- LEFT SIDE PANEL -->
			<div
				id="sidePanel"
				class="border-4 border-green-600 w-1/2 flex flex-col justify-center px-2">
				<div class="flex flex-col items-center">
					<a
						id="enterButton"
						title="Back to Arcade Menu!"
						href="../Arcade/index.html"
						class="text-center text-green-600 px-4 text-2xl"
						>TRAVIS.LAMBERTE.COM</a
					>
					<h1 class="text-green-600">
						Guess the number of GumBalls and you win!!!
					</h1>
					<h1 class="text-green-600">
						What do you win?!... Nothing!, but look at all those,
					</h1>
					<h1 class="text-green-600">Yummy! Yummy! GumBalls!!!</h1>
				</div>

				<div class="flex justify-center items-center">
					<div class="flex font-bold justify-center">
						<div class="flow-root"></div>
					</div>
				</div>

				<br />

				<!-- GAME CONTROLS -->
				<div
					class="flex flex-col items-center border-2 border-green-600 rounded-lg">
					<h1 id="gameMessage" class="text-green-600">
						Enter a number between 0 and 1000.
					</h1>
					<h1 id="lowGuesses" class="text-green-600"></h1>
					<h1 id="highGuesses" class="text-green-600"></h1>

					<br />
					<input
						id="playerGuess"
						class=""
						placeholder="Guess GumBalls Win!!!!"
						type="number"
						name="guess"
						min="1" />
					<br />

					<div class="px-8 flex flex-col items-center">
						<button
							id="guessButton"
							title="Guess"
							class="font-bold border-4 text-green-600 bg-yellow-400 border-green-600 inline-block px-4 py-1 rounded-full">
							GUESS
						</button>
					</div>

					<br />

					<div class="px-8 flex flex-col items-center">
						<button
							id="button1"
							title="Restack"
							class="font-bold border-4 text-green-600 bg-yellow-400 border-green-600 inline-block px-4 py-1 rounded-full">
							RESET
						</button>
					</div>

					<br />
				</div>
			</div>

			<!-- GAME CANVAS -->
			<div id="canvasContainer" class="w-3/4 bg-white">
				<canvas></canvas>
			</div>
		</div>

	</body>
</html>
